name: PR Risk Label

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Set risk label by changed files
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const highRiskPatterns = [
              /^server\/migrations\//,
              /^server\/internal\/handler\/auth/i,
              /^server\/internal\/runtime\//,
              /^server\/internal\/daemon\//,
              /^server\/internal\/handler\//,
              /^\.github\/workflows\//,
              /^Dockerfile$/,
              /^Dockerfile\.web$/,
              /^docker-compose.*\.yml$/,
              /^apps\/.*\/(firebase|functions)\//i,
              /^apps\/.*\/.*(firebase|app.?check|minInstances|service-account|serviceAccount).*/i,
              /^packages\/core\/platform\//,
              /^packages\/core\/api\//
            ];

            const changed = files.map(f => f.filename);
            const isHighRisk = changed.some((filename) =>
              highRiskPatterns.some((p) => p.test(filename))
            );

            const riskHigh = "risk:high";
            const riskNormal = "risk:normal";

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description
                  });
                  return;
                }
                throw e;
              }
            }

            async function addLabel(name) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: [name]
              });
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull_number,
                  name
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            await ensureLabel(riskHigh, "b60205", "High-risk change requiring deeper review");
            await ensureLabel(riskNormal, "0e8a16", "Normal-risk change");

            if (isHighRisk) {
              await addLabel(riskHigh);
              await removeLabel(riskNormal);
              core.info(`Applied ${riskHigh}`);
            } else {
              await addLabel(riskNormal);
              await removeLabel(riskHigh);
              core.info(`Applied ${riskNormal}`);
            }
